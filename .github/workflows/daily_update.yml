name: Daily Settlement Tracker Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Sets up Python safely without forcing a requirements file
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Runs your script (Checks for main.py or tracker.py automatically)
      - name: Run Tracker Script
        run: |
          if [ -f main.py ]; then python main.py; fi
          if [ -f tracker.py ]; then python tracker.py; fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update daily settlement information [skip ci]"
            git push
          else
            echo "No new settlement data found today."
          fi
