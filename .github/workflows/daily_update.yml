name: Daily Settlement Tracker Update

on:
  schedule:
    # Runs every day at 00:00 UTC (Adjust time as needed)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run this manually anytime from the Actions tab

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # OPTION 1: IF YOUR SCRIPT IS PYTHON (Delete this section if Node.js)
      # -------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Optional: Caches dependencies

      - name: Install Python Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Change 'main.py' to your actual script file name
      - name: Run Tracker Script (Python)
        run: python main.py 
      # -------------------------------------------------------------

      # -------------------------------------------------------------
      # OPTION 2: IF YOUR SCRIPT IS NODE.JS (Delete this section if Python)
      # -------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Optional: Caches dependencies

      - name: Install Node Dependencies
        run: npm install

      # Change 'index.js' or 'npm run start' to your actual script execution command
      - name: Run Tracker Script (Node)
        run: node index.js
      # -------------------------------------------------------------

      # -------------------------------------------------------------
      # STEP 3: Commit and Push the Updated Data/Blog Files
      # -------------------------------------------------------------
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all changes (new settlement data files, markdown blogs, etc.)
          git add .
          
          # Only commit if there are actual updates to avoid empty commit errors
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update daily settlement information [skip ci]"
            git push
          else
            echo "No new settlement data found today."
          fi
