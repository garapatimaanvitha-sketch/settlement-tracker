        .nav-meta {{ font-size: 0.85em; color: #64748b; font-weight: 500; }}
        .status-banner {{ display: inline-flex; align-items: center; gap: 6px; background: #d1fae5; color: #065f46; padding: 6px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.05em; }}
